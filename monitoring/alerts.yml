# ═══════════════════════════════════════════════════════════
# Prometheus Alert Rules — Portfolio Monitoring
# ═══════════════════════════════════════════════════════════
groups:
  - name: portfolio-alerts
    rules:
      # API server is down
      - alert: APIDown
        expr: up{job="portfolio-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Portfolio API is down"
          description: "The portfolio API server has been unreachable for over 1 minute."

      # High error rate (>5% of requests returning 5xx)
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate detected"
          description: "More than 5% of requests are returning 5xx errors."

      # High response time
      - alert: HighResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High API response time"
          description: "95th percentile response time is above 2 seconds."
