
<section id="services" class="py-20 md:py-32 bg-[#0d0d0d]">
  <div class="container mx-auto px-4">
    <div class="text-center mb-12">
      <h2 class="font-orbitron text-3xl md:text-4xl font-bold text-white">SERVICES & EXPERTISE</h2>
      <div class="w-24 h-1 bg-gradient-to-r from-cyan-500 to-emerald-600 mx-auto mt-4"></div>
      <p class="mt-4 text-lg text-gray-400 max-w-2xl mx-auto">End-to-end cybersecurity services — from threat detection to secure architecture.</p>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      @for (service of services; track service.title) {
        <div class="service-card group">
          <div class="p-8">
            <div class="text-cyan-400 mb-4" [innerHTML]="service.icon"></div>
            <h3 class="text-xl font-bold text-white mb-2">{{ service.title }}</h3>
            <p class="text-gray-400">{{ service.description }}</p>
          </div>
        </div>
      }
    </div>
  </div>
</section>
