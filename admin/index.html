<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark">
  <title>Dhruvkumar Dobariya — Security Operations Center</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <canvas id="cyber-bg" aria-hidden="true"></canvas>

  <div id="app">
    <div id="load-fallback" style="display:flex;align-items:center;justify-content:center;min-height:100vh;color:#AAB2D5;font-family:Inter,system-ui,sans-serif;flex-direction:column;gap:1.5rem">
      <div class="cyber-loader">
        <div class="cyber-loader-ring"></div>
        <div class="cyber-loader-ring"></div>
        <svg class="cyber-loader-shield" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      </div>
      <p style="font-size:0.85rem;letter-spacing:0.05em">Initializing Security Dashboard...</p>
    </div>
  </div>

  <script>
    window.onerror = function(msg, src, line, col, err) {
      var el = document.getElementById('load-fallback');
      if (!el) { el = document.createElement('div'); document.body.appendChild(el); }
      el.style.cssText = 'padding:2rem;color:#FF3B3B;font-family:monospace;font-size:0.85rem;white-space:pre-wrap;background:#0A0F1C;min-height:100vh';
      el.innerHTML = '<h2 style="color:#FF3B3B;margin-bottom:1rem">Security Dashboard Error</h2>'
        + '<p><strong>Message:</strong> ' + msg + '</p>'
        + '<p><strong>Source:</strong> ' + src + '</p>'
        + '<p><strong>Line:</strong> ' + line + ':' + col + '</p>'
        + (err && err.stack ? '<pre style="margin-top:1rem;color:#FF9F1A">' + err.stack + '</pre>' : '');
      return false;
    };
    window.addEventListener('unhandledrejection', function(e) {
      console.error('[SOC] Unhandled rejection:', e.reason);
    });
  </script>
  <script src="admin.js"></script>
</body>
</html>
